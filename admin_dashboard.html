<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Karate Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-danger mb-4">
        <div class="container">
            <button onclick="location.href='event_selector.html'\" class=\"btn btn-light btn-sm\">← Torna alle Gare</button>
            <span class="navbar-brand">Pannello Amministratore GLOBAL</span>
            <button onclick="exportToCSV()" class="btn btn-success btn-sm">Scarica Excel (CSV)</button>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="card shadow border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="adminTable">
                        <thead class="table-dark">
                            <tr>
                                <th>Gara</th>
                                <th>Società</th>
                                <th>Atleta</th>
                                <th>Classe</th>
                                <th>Peso</th>
                                <th>Sesso</th>
                            </tr>
                        </thead>
                        <tbody id="globalList">
                            <tr><td colspan="6" class="text-center">Caricamento dati in corso...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
