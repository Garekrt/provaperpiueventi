<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-danger mb-4">
        <div class="container">
            <button onclick="location.href='event_selector.html'" class="btn btn-light btn-sm">Indietro</button>
            <span class="navbar-brand">Dashboard Globale Amministratore</span>
            <button onclick="exportCSV()" class="btn btn-success btn-sm">Esporta CSV</button>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="card shadow border-0">
            <div class="card-body">
                <table class="table" id="adminTable">
                    <thead><tr><th>Gara</th><th>Società</th><th>Atleta</th><th>Classe</th><th>Peso</th></tr></thead>
                    <tbody id="globalList"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const ADMINS = ["f5c8f562-6178-4956-89ff-a6d1e3b32514"];
        async function load() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user || !ADMINS.includes(user.id)) { window.location.href='index.html'; return; }

            const { data } = await sb.from('iscrizioni_eventi').select('eventi(nome), atleti(first_name, last_name, classe, weight_category, societa(nome))');
            document.getElementById('globalList').innerHTML = data.map(i => `
                <tr>
                    <td>${i.eventi?.nome}</td>
                    <td>${i.atleti?.societa?.nome}</td>
                    <td>${i.atleti?.last_name} ${i.atleti?.first_name}</td>
                    <td>${i.atleti?.classe}</td>
                    <td>${i.atleti?.weight_category}</td>
                </tr>`).join('');
        }
        function exportCSV() {
            let csv = "Gara,Societa,Atleta,Classe,Peso\n";
            document.querySelectorAll("#adminTable tr").forEach((row, i) => {
                if(i===0) return;
                const cols = row.querySelectorAll("td");
                csv += Array.from(cols).map(c => `"${c.innerText}"`).join(",") + "\n";
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'iscritti.csv'; a.click();
        }
        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
</html>
